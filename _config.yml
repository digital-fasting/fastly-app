# Feature List — Fastly key features
features                                  :

  - title                                 : Live countdown timer
    description                           : Always know how far you've come and how much is left. Your commitment, always in view.
    fontawesome_icon_name                 : stopwatch

  - title                                 : Home & Lock Screen widgets
    description                           : Glance at your fast without even unlocking your phone. Add the widget and stay accountable.
    fontawesome_icon_name                 : mobile-alt

  - title                                 : Custom triggers
    description                           : Pick from built-in triggers (news, social media, gossip) or create your own with a personal icon and color.
    fontawesome_icon_name                 : sliders-h

  - title                                 : Streaks & history
    description                           : See your patterns, celebrate your wins, and track total fasting hours and completion rates.
    fontawesome_icon_name                 : chart-line

  - title                                 : Milestone celebrations
    description                           : Confetti and badges when you hit key checkpoints. Fastly turns discipline into visible progress.
    fontawesome_icon_name                 : trophy

  - title                                 : Scheduled fasts
    description                           : Plan fasts in advance so you never miss a beat. From 1 hour to a full week.
    fontawesome_icon_name                 : calendar-alt

  - title                                 : Break tracking
    description                           : If you break a fast, log the reason and restart stronger. No guilt — just clarity.
    fontawesome_icon_name                 : undo

  - title                                 : iCloud sync
    description                           : Your fasts follow you across all your Apple devices. Notifications and gentle check-ins keep you on track.
    fontawesome_icon_name                 : cloud

